<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a1d27"/>

  <!-- Thermometer body -->
  <rect x="220" y="80" width="72" height="240" rx="36" fill="#2a2d3a" stroke="#4a90d9" stroke-width="8"/>

  <!-- Mercury fill -->
  <rect x="236" y="180" width="40" height="152" rx="20" fill="#e67e22"/>

  <!-- Thermometer bulb -->
  <circle cx="256" cy="360" r="56" fill="#e67e22"/>
  <circle cx="256" cy="360" r="38" fill="#f39c12"/>

  <!-- Tick marks -->
  <line x1="292" y1="140" x2="316" y2="140" stroke="#4a90d9" stroke-width="6" stroke-linecap="round"/>
  <line x1="292" y1="180" x2="316" y2="180" stroke="#4a90d9" stroke-width="6" stroke-linecap="round"/>
  <line x1="292" y1="220" x2="316" y2="220" stroke="#4a90d9" stroke-width="6" stroke-linecap="round"/>
  <line x1="292" y1="260" x2="316" y2="260" stroke="#4a90d9" stroke-width="6" stroke-linecap="round"/>
  <line x1="292" y1="300" x2="316" y2="300" stroke="#4a90d9" stroke-width="6" stroke-linecap="round"/>

  <!-- Heat waves -->
  <path d="M340 200 Q360 185 340 170 Q320 155 340 140" stroke="#e74c3c" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M375 200 Q395 185 375 170 Q355 155 375 140" stroke="#e74c3c" stroke-width="10" fill="none" stroke-linecap="round"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Heat Pumps</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --text:     #e8eaf0;
      --muted:    #6b7080;
      --blue:     #4a90d9;
      --green:    #2ecc71;
      --orange:   #e67e22;
      --red:      #e74c3c;
      --yellow:   #f1c40f;
      --radius:   14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 { font-size: 1.1rem; font-weight: 600; flex: 1; }
    .header-sub { font-size: 0.75rem; color: var(--muted); }

    /* ── Layout ── */
    .units {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      padding: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      transition: border-color 0.2s;
    }
    .card--on  { border-color: var(--blue); }
    .card--off { opacity: 0.85; }
    .card--error { border-color: var(--red); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .card-icon { font-size: 1.4rem; }
    .card-name { font-weight: 600; font-size: 1rem; flex: 1; }
    .card-status { font-size: 0.75rem; color: var(--muted); }

    /* ── Temperature row ── */
    .temps-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .room-temp-wrap, .settemp-wrap {
      flex: 1;
      background: var(--bg);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .temp-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .room-temp { font-size: 2rem; font-weight: 700; color: var(--blue); }
    .outdoor-temp { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
    .settemp-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px; }
    .stemp-val { font-size: 1.6rem; font-weight: 700; min-width: 70px; text-align: center; }

    /* ── Sections ── */
    .section-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 12px 0 6px;
    }

    /* ── Button row ── */
    .btn-row, .fdir-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .fdir-current {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Buttons ── */
    .btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 6px 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: #2a2d3a; }

    .btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      font-weight: 600;
    }

    .btn-power {
      padding: 7px 14px;
      font-size: 0.85rem;
      border-radius: 20px;
    }
    .btn-power.active {
      background: var(--green);
      border-color: var(--green);
    }

    .btn-adj {
      font-size: 1.1rem;
      width: 34px;
      height: 34px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Refresh button ── */
    #btnRefresh {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 12px;
      font-size: 0.8rem;
    }
    #btnRefresh:hover { color: var(--text); border-color: var(--muted); }

    @media (max-width: 400px) {
      .units { padding: 12px; gap: 12px; }
      .card  { padding: 14px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>🌡 Heat Pumps</h1>
    <div class="header-sub">Daikin local control</div>
  </div>
  <button id="btnRefresh">↻ Refresh</button>
</div>

<div class="units" id="units"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>

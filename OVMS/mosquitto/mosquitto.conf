# Mosquitto MQTT Broker - OVMS Configuration
# Standard MQTT (for OVMS device)
listener 1883
protocol mqtt

# WebSocket (for webapp in browser)
listener 8083
protocol websockets

# Allow only authenticated users
allow_anonymous false
password_file C:\claude_workspace\OVMS\mosquitto\passwd

# Persist messages so device data survives restarts
persistence true
persistence_location C:\claude_workspace\OVMS\mosquitto\data\

# Logging
log_dest file C:\claude_workspace\OVMS\mosquitto\mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
